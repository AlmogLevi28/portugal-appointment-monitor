name: Check Portugal Appointments

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run monitor
        run: node monitor.js
